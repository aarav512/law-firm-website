name: Restore index.html from CDN

on:
  push:
    paths:
      - '.github/workflows/restore-index.yml'
  workflow_dispatch:

jobs:
  restore-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download index.html from CDN
        run: |
          curl -L -o index.html \
            "https://customer-assets-gfyr7b9c.emergentagent.net/wingman/d9e0c03d-360a-47fb-9eb8-40e0ecb2bc98/attachments/ea451c158cb5499a89f0fe94d67e1c4f_index.html"
          echo "Downloaded $(wc -c < index.html) bytes"
          grep -o 'Adore%20Exclusive[^"]*' index.html | head -1 && echo 'Map URL verified'

      - name: Commit and push
        run: |
          git config user.email "srvsharma.adv@gmail.com"
          git config user.name "Saurav Sharma"
          git add index.html
          git diff --cached --stat
          git commit -m "fix: restore index.html with correct Google Maps embed (Adore Exclusive, Sector 86, Faridabad)" || echo "Nothing to commit"
          git push
