name: Update Website Files

on:
  push:
    paths:
      - '.github/workflows/update-index.yml'
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download full index.html from CDN
        run: |
          curl -L -o index.html             "https://customer-assets-gfyr7b9c.emergentagent.net/wingman/d9e0c03d-360a-47fb-9eb8-40e0ecb2bc98/attachments/ba8e710214bb45b09c034abef293001f_index.html"
          echo "Downloaded $(wc -c < index.html) bytes"
          head -3 index.html

      - name: Commit and push
        run: |
          git config user.email "srvsharma.adv@gmail.com"
          git config user.name "Saurav Sharma"
          git add index.html
          git diff --cached --stat
          git commit -m "fix: update Formspree endpoint to active form ID (xbdnowowa)" || echo "Nothing to commit"
          git push
