name: Update index.html from CDN

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-html.yml'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download updated index.html
        run: |
          curl -sL "https://customer-assets-gfyr7b9c.emergentagent.net/wingman/d9e0c03d-360a-47fb-9eb8-40e0ecb2bc98/attachments/712e5e8bf5e048a7b1b550ff4999fad4_index.html" -o index.html
          echo "Downloaded index.html ($(wc -c < index.html) bytes)"
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "feat: add legal insights section, functional contact form, and complete SEO setup"
          git push
