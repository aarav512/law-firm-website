name: Update Maps Embed
on: workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update maps
        run: |
          sed -i 's|src="https://www.google.com/maps/embed[^"]*"|src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3510.5234!2d77.38901!3d28.38234!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390cdc0bf4cfffff%3A0x0!2s0Adore%20Exclusive%2C%20Tower%20T%2C%20Sector%2086%2C%20Faridabad%2C%20Haryana%20121004!5e0!3m2!1en!2sin!4v1721380000000!5m2!1en!2sin"|g' index.html
      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html
          git diff --quiet --exit-code || git commit -m "fix: update Google Maps embed to Adore Exclusive Sector 86 Faridabad"
          git push