name: Setup Website Files

on:
  push:
    paths:
      - '.github/workflows/setup-website.yml'
  workflow_dispatch:

jobs:
  commit-website:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download full index.html from CDN
        run: |
          curl -L -o index.html \
            "https://customer-assets-gfyr7b9c.emergentagent.net/wingman/d9e0c03d-360a-47fb-9eb8-40e0ecb2bc98/attachments/128fb3a3c9184826a5575cad98ce505d_index.html"
          echo "Downloaded $(wc -c < index.html) bytes"
          head -3 index.html

      - name: Commit and push
        run: |
          git config user.email "advocate@sauravsharmadvocate.com"
          git config user.name "Saurav Sharma, Advocate"
          git add index.html
          git diff --cached --stat
          git commit -m "feat: add complete law firm website for Saurav Sharma, Advocate" || echo "Nothing to commit"
          git push
